# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Sunny的生物信息学笔记
subtitle: '从 scRNA-seq 到 SCLLM 的一线实战'
description: '个人技术博客：单细胞测序、深度学习、AI Agent、Python 实战'
keywords: 'scRNA-seq, Geneformer, scGPT, single-cell, deep learning, bioinformatics'
author: Sunny (zhuer)
language: zh-CN
timezone: Asia/Shanghai
url: https://zhuer.github.io
root: /

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: true

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: fluid

# Meta generator
meta_generator: true

# Abbrlink (短链)
permalink: :year/:month/:day/:abbrlink/
abbrlink:
  alg: crc32
  rep: hex
  perma: 0

# Markdown
marked:
  gfm: true
  breaks: false
  smartLists: true

# Deployment - GitHub Pages
deploy:
  type: git
  repo: https://github.com/zhuer/zhuer.github.io.git
  branch: main
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"
